name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Cache dependency jars
        uses: actions/cache@v4
        with:
          path: Dependencies/*.jar
          key: deps-${{ hashFiles('ci/fetch-deps.sh') }}

      - name: Fetch compileOnly dependencies
        run: bash ci/fetch-deps.sh

      - name: Build and test
        run: ./gradlew --no-daemon compileJava test

modLoader="javafml"
loaderVersion="[47,)"
license="All Rights Reserved"
issueTrackerURL="https://github.com/otectus/runic-races/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Otectus"
description='''
Runic Races — a flagship Origins add-on built for the Runecraft modpack.
Pick from 24 hand-designed races across 6 families (Mortal, Fae, Beast, Underfolk, Dragon, Cursed),
each with signature active abilities, environmental affinities, and reflection-guarded
integration with Ars Nouveau, Iron's Spellbooks, Curios, Apotheosis, Pehkui, Feathers, Runic Skills and Runic Gods.
Race is identity — static, fantasy-consistent, and orthogonal to Skills and Gods progression.
'''

# Required: Forge
[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="[${forge_version},)"
ordering="NONE"
side="BOTH"

# Required: Minecraft
[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},)"
ordering="NONE"
side="BOTH"

# Required: Origins Forge
[[dependencies.${mod_id}]]
modId="origins"
mandatory=true
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

# Optional: Ars Nouveau
[[dependencies.${mod_id}]]

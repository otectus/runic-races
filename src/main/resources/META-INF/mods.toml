modLoader="javafml"
loaderVersion="[47,)"
license="All Rights Reserved"
issueTrackerURL="https://github.com/otectus/runic-races/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Otectus"
description='''
Runic Races — a flagship Origins add-on built for the Runecraft modpack.
Pick from 37 hand-designed races across 7 families (Human, Elven, Dwarven, Bestial, Faeborne, Undead, Draconic),
each with one signature active ability, one passive strength, one weakness, environmental affinities,
and reflection-guarded integration with Ars Nouveau, Iron's Spellbooks, Curios, Apotheosis, Pehkui, and Feathers.
Race is identity — static, fantasy-consistent, and orthogonal to other progression.
'''

# Required: Forge
[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="[${forge_version},)"
ordering="NONE"
side="BOTH"

# Required: Minecraft
[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},)"
ordering="NONE"
side="BOTH"

# Required: Origins Forge
[[dependencies.${mod_id}]]
modId="origins"
mandatory=true
versionRange="[1.10,)"
ordering="AFTER"
side="BOTH"

# Optional: Ars Nouveau
[[dependencies.${mod_id}]]
modId="ars_nouveau"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

# Optional: Iron's Spellbooks
[[dependencies.${mod_id}]]
modId="irons_spellbooks"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

# Optional: Curios
[[dependencies.${mod_id}]]
modId="curios"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

# Optional: Apotheosis
[[dependencies.${mod_id}]]
modId="apotheosis"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

# Optional: Pehkui
[[dependencies.${mod_id}]]
modId="pehkui"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"

# Optional: Feather's Mod
[[dependencies.${mod_id}]]
modId="feathers"
mandatory=false
versionRange="[0,)"
ordering="AFTER"
side="BOTH"
